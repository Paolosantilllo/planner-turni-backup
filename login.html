
<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Login Planner</title>

<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

  <div class="login-box">

    <img
      src="logo.png"
      width="80"
      alt="Logo"
    >

    <h2>Planner Turni</h2>

    <input
      type="email"
      id="email"
      placeholder="Email"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <button onclick="login()">
      Accedi
    </button>

  </div>

</div>

<script
  type="module"
  src="login.js"
></script>

</body>

</html>
