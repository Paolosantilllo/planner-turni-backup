<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planner Turni</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f2f2f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Planner Turni">

  <link rel="icon" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="app-logo">
  </div>

  <!-- HEADER -->
  <header class="topbar">

    <button class="month-btn" onclick="prevMonth()">◀</button>

    <h1 id="monthTitle"></h1>

    <button class="month-btn" onclick="nextMonth()">▶</button>

  </header>

  <!-- INVIO MENSILE -->
  <div class="monthly-send">
    <button class="monthly-send-btn" onclick="generatePDF()">
      📤 Invia Mensile
    </button>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">

    <select id="employeeFilter" onchange="renderCalendar()">
      <option value="ALL">Tutti</option>
      <option>Dipendente D</option>
      <option>Dipendente C</option>
      <option>Dipendente B</option>
      <option>Dipendente A</option>
    </select>

    <div class="toolbar-actions">

      <button class="change-btn" onclick="openChangePopup()">🔁</button>

      <button class="notify-btn" onclick="openRequestsPopup()">🔔</button>

      <button class="add-btn" onclick="openPopup()">+</button>

    </div>

  </div>

  <!-- GIORNI -->
  <div class="weekdays">
    <div>L</div>
    <div>Ma</div>
    <div>Me</div>
    <div>G</div>
    <div>V</div>
    <div class="saturday">S</div>
    <div class="sunday">D</div>
  </div>

  <!-- CALENDARIO -->
  <div class="calendar" id="calendar"></div>

</div>

<!-- POPUP TURNI -->
<div class="popup" id="popup">

  <div class="popup-content">

    <div class="popup-header">
      <h2>Nuovo Inserimento</h2>

      <button class="close-btn" onclick="closePopup()">
        ✕
      </button>
    </div>

    <label>Dipendente</label>

    <select id="employee">
      <option>Dipendente D</option>
      <option>Dipendente C</option>
      <option>Dipendente B</option>
      <option>Dipendente A</option>
    </select>

    <label>Data Inizio</label>
    <input type="date" id="startDate">

    <label>Data Fine</label>
    <input type="date" id="endDate">

    <label>Turno</label>

    <select id="shift">
      <option></option>
      <option>REP</option>
      <option>FREP</option>
      <option>CFI</option>
      <option>CFI/REP</option>
      <option>LIC</option>
      <option>REC</option>
    </select>

    <button class="save-btn" onclick="saveShift()">
      Salva
    </button>

    <button class="delete-btn" onclick="deleteShift()">
      Elimina
    </button>

  </div>

</div>

<!-- POPUP CAMBIO TURNO -->
<div class="popup" id="changePopup">

  <div class="popup-content">

    <div class="popup-header">

      <h2>Richiesta Cambio</h2>

      <button class="close-btn" onclick="closeChangePopup()">
        ✕
      </button>

    </div>

    <!-- CHI RICHIEDE -->
    <label>Chi richiede</label>

    <select id="changeFrom" onchange="loadChangeDays()">
      <option>Dipendente D</option>
      <option>Dipendente C</option>
      <option>Dipendente B</option>
      <option>Dipendente A</option>
    </select>

    <!-- CAMBIO CON -->
    <label>Cambio con</label>

    <select id="changeTo" onchange="loadChangeDays()">
      <option>Dipendente D</option>
      <option>Dipendente C</option>
      <option>Dipendente B</option>
      <option>Dipendente A</option>
    </select>

    <!-- TURNO -->
    <label>Turno</label>

    <select id="changeShift" onchange="loadChangeDays()">
      <option>REP</option>
      <option>FREP</option>
      <option>CFI</option>
      <option>CFI/REP</option>
      <option>LIC</option>
      <option>REC</option>
    </select>

    <!-- GIORNO DA DARE -->
    <label>Giorno da dare</label>

    <div
      class="calendar-selector"
      onclick="toggleMiniCalendar('from')"
    >
      <span id="selectedFromText">
        Seleziona giorno
      </span>
    </div>

    <div
      id="changeCalendarFrom"
      class="mini-calendar hidden-calendar"
    >

      <div class="mini-weekdays">
        <div>L</div>
        <div>Ma</div>
        <div>Me</div>
        <div>G</div>
        <div>V</div>
        <div>S</div>
        <div>D</div>
      </div>

      <div
        class="mini-calendar-grid"
        id="miniGridFrom"
      ></div>

    </div>

    <!-- GIORNO DA RICEVERE -->
    <label>Giorno da ricevere</label>

    <div
      class="calendar-selector"
      onclick="toggleMiniCalendar('to')"
    >
      <span id="selectedToText">
        Seleziona giorno
      </span>
    </div>

    <div
      id="changeCalendarTo"
      class="mini-calendar hidden-calendar"
    >

      <div class="mini-weekdays">
        <div>L</div>
        <div>Ma</div>
        <div>Me</div>
        <div>G</div>
        <div>V</div>
        <div>S</div>
        <div>D</div>
      </div>

      <div
        class="mini-calendar-grid"
        id="miniGridTo"
      ></div>

    </div>

    <!-- INVIA -->
    <button
      class="save-btn"
      onclick="sendChangeRequest()"
    >
      Invia Richiesta
    </button>

  </div>

</div>
<!-- POPUP RICHIESTE -->
<div class="popup" id="requestsPopup">

  <div class="popup-content">

    <div class="popup-header">

      <h2>Richieste Cambio Turno</h2>

      <button class="close-btn" onclick="closeRequestsPopup()">
        ✕
      </button>

    </div>

    <div id="requestsList"></div>

  </div>

</div>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  updateDoc,
  onSnapshot,
  doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCKQp_DA2Bjbs6g27Wwl8eo_kyzzI2A40",
  authDomain: "calendario-rep.firebaseapp.com",
  projectId: "calendario-rep",
  storageBucket: "calendario-rep.firebasestorage.app",
  messagingSenderId: "1067128179274",
  appId: "1:1067128179274:web:e1c7174c25bdabee2ff4b3"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
window.auth = auth;

const db = getFirestore(app);
window.db = db;

window.firebaseFirestore = {
  collection,
  addDoc,
  deleteDoc,
  updateDoc,
  onSnapshot,
  doc
};

/* =========================
   LOGIN FUNCTIONS
========================= */

window.doLogin = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    alert("Login fallito");
  }
};

window.logout = async function () {
  await signOut(auth);
};

/* =========================
   LOGIN STATE CONTROL
========================= */

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.querySelector(".app").style.display = "block";
    const loginBox = document.getElementById("loginBox");
    if (loginBox) loginBox.style.display = "none";
  } else {
    document.querySelector(".app").style.display = "none";
    const loginBox = document.getElementById("loginBox");
    if (loginBox) loginBox.style.display = "flex";
  }
});

</script>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
