<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planner Turni</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <header class="topbar">
      <h1 id="monthTitle"></h1>
<select id="employeeFilter" onchange="renderCalendar()">

  <option value="ALL">Tutti</option>

  <option value="PERCACCIOLI">
    PERCACCIOLI
  </option>

  <option value="MANUNTA">
    MANUNTA
  </option>

  <option value="SANTILLO">
    SANTILLO
  </option>

</select>
      <button class="add-btn" onclick="openPopup()">
        +
      </button>
    </header>

  <div class="weekdays">
  <div>L</div>
  <div>Ma</div>
  <div>Me</div>
  <div>G</div>
  <div>V</div>
  <div>S</div>
  <div>D</div>
</div>

<div class="calendar" id="calendar"></div>

  </div>

  <!-- POPUP -->
  <div class="popup" id="popup">

    <div class="popup-content">

      <div class="popup-header">
        <h2>Nuovo Inserimento</h2>

        <button class="close-btn" onclick="closePopup()">
          ✕
        </button>
      </div>

      <label>Dipendente</label>

      <select id="employee">
        <option>PERCACCIOLI</option>
        <option>MANUNTA</option>
        <option>SANTILLO</option>
      </select>

    <label>Data Inizio</label>
<input type="date" id="startDate">

<label>Data Fine</label>
<input type="date" id="endDate">

      <label>Turno</label>

      <select id="shift">
        <option>   </option>
        <option>REP</option>
        <option>FREP</option>
        <option>CFI</option>
        <option>CFI/REP</option>
        <option>LIC</option>
        <option>REC</option>
      </select>

      <button class="save-btn" onclick="saveShift()">
        Salva
      </button>

    </div>

  </div>

  <script type="module" src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
