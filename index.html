
<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planner REP</title>

  <link rel="icon" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app" id="app" style="display:none;">

  <div class="app-logo">
  </div>

  <!-- HEADER -->
<header class="topbar">

  <button class="month-btn" onclick="prevMonth()">◀</button>

  <h1 id="monthTitle"></h1>

  <button class="month-btn" onclick="nextMonth()">▶</button>

  <button class="logout-btn" onclick="logout()">Logout</button>

</header>

<!-- 📤 PDF EXPORT -->
<div class="monthly-send">
  <button class="monthly-send-btn" id="pdfBtn">
    📤
  </button>
</div>

  <!-- TOOLBAR -->
  <div class="toolbar">

    <select id="employeeFilter" onchange="renderCalendar()">
  <option value="ALL">Tutti</option>
  <option value="A">SANTILLO</option>
  <option value="B">MANUNTA</option>
  <option value="C">PERCACCIOLI</option>
  <option value="D">Dipendente D</option>
</select>

  <div class="toolbar-actions">

  <button class="change-btn" onclick="openChangePopup()">
    🔁
  </button>

  <button class="notify-btn" onclick="openRequestsPopup()">
    📋 <span id="requestBadge"></span>
  </button>

  <button class="notify-btn" onclick="openNotificationsPopup()">
    🔔 <span id="notifBadge"></span>
  </button>

  <button
  id="statsBtn"
  class="stats-btn"
  onclick="openStatsPopup()">
  📊
</button>

<button
  id="addBtn"
  class="add-btn"
  onclick="openPopup()">
  +
</button>

</div>

  </div>

  <!-- GIORNI -->
  <div class="weekdays">
    <div>L</div>
    <div>Ma</div>
    <div>Me</div>
    <div>G</div>
    <div>V</div>
    <div class="saturday">S</div>
    <div class="sunday">D</div>
  </div>

  <!-- CALENDARIO -->
  <div class="calendar" id="calendar"></div>

</div>

<!-- POPUP REPERIBILITÀ -->
<div class="popup" id="popup">

  <div class="popup-content">

    <div class="popup-header">
      <h2>Nuovo Inserimento</h2>

      <button class="close-btn" onclick="closePopup()">
        ✕
      </button>
    </div>

    <label>Dipendente</label>

  <select id="employee">
  <option value="A">SANTILLO</option>
  <option value="B">MANUNTA</option>
  <option value="C">Dipendente C</option>
  <option value="D">Dipendente D</option>
</select>

    <label>Data Inizio</label>
    <input type="date" id="startDate">

    <label>Data Fine</label>
    <input type="date" id="endDate">

    <label>Reperibilità</label>

    <select id="shift">
      <option></option>
      <option>REP</option>
      <option>FREP</option>
      <option>CFI</option>
      <option>CFI/REP</option>
      <option>LIC</option>
      <option>REC</option>
      <option value="MAL">MAL</option>
    </select>

    <button class="save-btn" onclick="saveShift()">
      Salva
    </button>

    <button class="delete-btn" onclick="deleteShift()">
      Elimina
    </button>

  </div>

</div>

<!-- POPUP CAMBIO REPERIBILITÀ -->
<div class="popup" id="changePopup">

  <div class="popup-content">

    <div class="popup-header">

      <h2>Richiesta cambio reperibilità</h2>

      <button class="close-btn" onclick="closeChangePopup()">
        ✕
      </button>

    </div>


    <input type="hidden" id="changeFrom">


    <!-- CAMBIO CON -->
    <label>Cambio con</label>

    <select 
      id="changeTo" 
      onchange="loadChangeDays()">
    </select>



    <!-- REPERIBILITÀ -->
    <label>Reperibilità</label>

    <select 
      id="changeShift" 
      onchange="loadChangeDays()">

      <option>REP</option>
      <option>FREP</option>
      <option>CFI/REP</option>

    </select>




    <!-- GIORNO DA DARE -->
    <label>Giorno da dare</label>


    <div
      class="calendar-selector"
      onclick="toggleMiniCalendar('from')">

      <span id="selectedFromText">
        Seleziona giorno
      </span>

    </div>



    <div
      id="changeCalendarFrom"
      class="mini-calendar hidden-calendar">


      <div class="mini-weekdays">

        <div>L</div>
        <div>Ma</div>
        <div>Me</div>
        <div>G</div>
        <div>V</div>
        <div>S</div>
        <div>D</div>

      </div>


      <div
        class="mini-calendar-grid"
        id="miniGridFrom">
      </div>


    </div>





    <!-- GIORNO DA RICEVERE -->
    <label>Giorno da ricevere</label>


    <div
      class="calendar-selector"
      onclick="toggleMiniCalendar('to')">


      <span id="selectedToText">
        Seleziona giorno
      </span>


    </div>




    <div
      id="changeCalendarTo"
      class="mini-calendar hidden-calendar">


      <div class="mini-weekdays">

        <div>L</div>
        <div>Ma</div>
        <div>Me</div>
        <div>G</div>
        <div>V</div>
        <div>S</div>
        <div>D</div>

      </div>



      <div
        class="mini-calendar-grid"
        id="miniGridTo">
      </div>



    </div>





    <!-- INVIA -->

    <button
      class="save-btn"
      onclick="sendChangeRequest()">

      Invia Richiesta

    </button>



  </div>

</div>
<!-- POPUP RICHIESTE CAMBIO -->
<div class="popup" id="changeRequestsPopup">

  <div class="popup-content">

    <div class="popup-header">

      <h2>🔄 Richieste cambio</h2>

      <button class="close-btn" onclick="closeRequestsPopup()">
        ✕
      </button>

    </div>


    <div id="requestsList"></div>


  </div>

</div>

<!-- POPUP SOLO NOTIFICHE -->
<div class="popup" id="notificationsPopup">

  <div class="popup-content">

    <div class="popup-header">

      <h2>🔔 Notifiche</h2>

      <button class="close-btn" onclick="closeNotificationsPopup()">
        ✕
      </button>

    </div>

    <div id="notificationsOnlyList"></div>

  </div>

</div>
  
  <!-- POPUP AZIONE RICHIESTA -->
<div class="popup" id="requestActionPopup">

  <div class="popup-content">

    <div class="popup-header">

      <h2>Azione richiesta</h2>

      <button class="close-btn" onclick="closeRequestActionPopup()">
        ✕
      </button>

    </div>


    <div id="requestActionContent"></div>


    <div class="popup-actions">

      <button 
        class="btn-accept"
        id="actionAcceptBtn">
        ✅ Accetta
      </button>


      <button 
        class="btn-reject"
        id="actionRejectBtn">
        ❌ Rifiuta
      </button>

    </div>


  </div>

</div>
<!-- POPUP PDF EXPORT -->
<div class="popup" id="pdfPopup">

  <div class="popup-content">

    <div class="popup-header">

      <h2>Esportazione PDF</h2>

      <button class="close-btn" onclick="closePdfPopup()">
        ✕
      </button>

    </div>

    <p>
      Mancano alcune reperibilità.<br>
      Vuoi continuare l’esportazione?
    </p>

    <label for="monthsRange">Numero mesi da esportare</label>

    <select id="monthsRange">
      <option value="1">1 mese (mese corrente)</option>
      <option value="2">2 mesi</option>
      <option value="3">3 mesi</option>
      <option value="4">4 mesi</option>
    </select>

    <div class="popup-actions">

      <button class="save-btn" onclick="confirmPdfExport()">
        Genera PDF
      </button>

      <button class="delete-btn" onclick="closePdfPopup()">
        Annulla
      </button>

    </div>

  </div>

</div>

 
<!-- POPUP STATISTICHE -->
<div class="popup" id="statsPopup">

  <div class="popup-content">

    <div class="popup-header">

      <h2>📊 Statistiche Reperibilità</h2>

      <button
        class="close-btn"
        onclick="closeStatsPopup()">
        ✕
      </button>

    </div>

<div id="statsMenu">


<button 
class="save-btn"
onclick="showFestiviStats()">

🎉 Turnazione Festivi

</button>


<button 
class="save-btn"
onclick="showCfiStats()">

📊 Totale CFI / CFI-REP

</button>


</div>


<div id="statsContent"></div>


<div id="statsExport"></div>
  </div>

</div>
  
  <!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<!-- APP -->
<script type="module" src="app.js"></script>
